# RustDesk Web Client - rd.aspendora.com

# HTTP - redirect to HTTPS (and ACME challenge)
server {
    listen 80;
    server_name rd.aspendora.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name rd.aspendora.com;

    ssl_certificate /etc/letsencrypt/live/rd.aspendora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rd.aspendora.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # WebSocket for web client (hbbs)
    location /ws {
        proxy_pass http://rustdesk-hbbs:21118;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Default - info page
    location / {
        return 200 'RustDesk Server - rd.aspendora.com\nID Server: rd.aspendora.com:21116\nRelay Server: rd.aspendora.com:21117\n';
        add_header Content-Type text/plain;
    }
}
