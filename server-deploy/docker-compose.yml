name: rustdesk-server

networks:
  rustdesk-net:
    driver: bridge
  proxy-network:
    external: true

volumes:
  rustdesk_hbbs_data:
  rustdesk_hbbr_data:

services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    command: hbbs -r rd.aspendora.com:21117 -k _
    restart: unless-stopped
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
      - "21118:21118"
    volumes:
      - rustdesk_hbbs_data:/root
    networks:
      - rustdesk-net
      - proxy-network
    labels:
      - com.centurylinklabs.watchtower.enable=true

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    command: hbbr -k _
    restart: unless-stopped
    ports:
      - "21117:21117"
      - "21119:21119"
    volumes:
      - rustdesk_hbbr_data:/root
    networks:
      - rustdesk-net
    labels:
      - com.centurylinklabs.watchtower.enable=true
