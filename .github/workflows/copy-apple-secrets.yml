name: Copy Apple Secrets to ControlR
on:
  workflow_dispatch:

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Copy secrets to ControlR
        env:
          GH_TOKEN: ${{ secrets.TEMP_CONTROLR_PAT }}
          MACOS_P12_BASE64: ${{ secrets.MACOS_P12_BASE64 }}
          MACOS_P12_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
        run: |
          echo "$MACOS_P12_BASE64" | gh secret set MACOS_P12_BASE64 -R lacymooretx/controlr
          echo "Set MACOS_P12_BASE64 on ControlR"
          echo "$MACOS_P12_PASSWORD" | gh secret set MACOS_P12_PASSWORD -R lacymooretx/controlr
          echo "Set MACOS_P12_PASSWORD on ControlR"
          echo "Done! Both Apple signing secrets copied to ControlR."
